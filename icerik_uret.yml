name: ⚽ Futbol İçerik Üretici

on:
  schedule:
    # Her gün 07:00, 12:00 ve 18:00 UTC (Türkiye = UTC+3, yani 10:00, 15:00, 21:00)
    - cron: '0 7 * * *'
    - cron: '0 12 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:  # Elle de başlatılabilir

jobs:
  icerik-uret:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # icerikler.md'yi repoya yazabilmek için

    steps:
      - name: 📥 Repoyu indir
        uses: actions/checkout@v4

      - name: 🐍 Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Bağımlılıkları yükle
        run: pip install anthropic feedparser

      - name: 🤖 İçerikleri üret
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python icerik_uret.py

      - name: 📤 icerikler.md'yi repoya kaydet
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Futbol Bot"
          git add icerikler.md
          git diff --staged --quiet || git commit -m "⚽ $(date '+%d/%m/%Y %H:%M') içerikler güncellendi"
          git push
